dataset: "fashionai_attributes_full"

fashionai_attributes:
  # Generated by scripts/data/prepare_fashionai_full_attributes.py.
  train_annotations:
    - "/root/autodl-tmp/outputs/fashionai_full_stratified/train.csv"
  validation_annotations:
    - "/root/autodl-tmp/outputs/fashionai_full_stratified/validation.csv"
  test_annotations:
    - "/root/autodl-tmp/outputs/fashionai_full_stratified/test.csv"
  label_map: "configs/dataset/fashionai_round1_label_map.yaml"
  split_strategy: "content_hashed_stratified_attribute_and_y_class"
  split_seed: 42
  train_fraction: 0.8
  validation_fraction: 0.1
  test_fraction: 0.1
  validate_images: true
  skip_invalid_annotations: false
